# The message section which powers the entire plugin's translation system!
#
# Colors: black, dark_blue, dark_green, dark_aqua, dark_red, dark_purple, gold, gray, dark_gray, blue, green, aqua, red, light_purple, yellow, or white
# Hex Colors: <color:#e91e63>text</color> or <#e91e63>text</>
# Gradients: <gradient:#e91e63:red>text</gradient> or <#e91e63:red>text</>
messages:
  # Available placeholders: {prefix}
  reload-plugin: "{prefix}<yellow>You have reloaded the plugin!"
  # All messages related to players.
  player:
    # A set of requirement messages.
    requirements:
      # Available placeholders: {prefix}
      must-be-player: "{prefix}<red>You must be a player to use this command."
      # Available placeholders: {prefix}
      must-be-console-sender: "{prefix}<red>You must be using console to use this command."
    # Available placeholders: {prefix}, {player}
    target-not-online: "{prefix}<red>{player} <gray>is not online."
    # Available placeholders: {prefix}
    target-same-player: "{prefix}<red>You cannot use this command on yourself."
    # Available placeholders: {prefix}
    no-permission: "{prefix}<red>You do not have permission to use that command!"
    # Available placeholders: {prefix}
    inventory-not-empty: "{prefix}<red>Inventory is not empty, Please clear up some room."
  # All messages related to /msg
  msg:
    # Available Placeholders: {prefix}, {player}, {message}
    receiver-format: "<bold><red>(!)</red> <white>[</white></bold><yellow>{player} <light_purple>-></light_purple> You</yellow><bold><white>]</white></bold> <green>{message}"
    # Available Placeholders: {prefix}, {player}, {message}
    sender-format: "<bold><red>(!)</red> <white>[</white><yellow>You</yellow></bold> <light_purple>-></light_purple> <yellow>{player}</yellow><bold><white>]</white></bold> <green>{message}"
    # Available placeholders: {prefix}
    cannot-message-yourself: "{prefix}<red>You cannot message yourself!"
    # Available placeholders: {prefix}
    cannot-be-blank: "{prefix}<red>You cannot send a blank message!"
  # All messages relating to mute based commands.
  mute:
    # All messages related to /cb mutechat
    chat:
      # Available Placeholders: {prefix}, {player}
      server-muted-broadcast: "{prefix}{player} <red>has muted the chat, You cannot speak!"
      # Available Placeholders: {prefix}, {player}
      server-unmuted-broadcast: "{prefix}{player} <red>has unmuted the chat, You can now speak!"
      # Available Placeholders: {prefix}
      server-muted-sender: "{prefix}<red>You have muted the server chat!"
      # Available Placeholders: {prefix}
      server-unmuted-sender: "{prefix}<red>You have unmuted the server chat!"
      # Available Placeholders: {prefix}
      cannot-speak-while-muted: "{prefix}<red>You cannot speak while the server chat is muted!"
  # Available placeholders: {player}
  motd:
    - "<gray>------------------------------------"
    - ""
    - "<green>Welcome to the server <blue>{player}</blue>!"
    - ""
    - "<green>If you need any help, Please message online staff!"
    - ""
    - "<green>You can change this message in the messages.yml or the locale folder."
    - "<gray>------------------------------------"